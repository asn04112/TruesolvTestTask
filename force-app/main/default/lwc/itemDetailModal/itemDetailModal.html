<template>
    <section role="dialog" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
            <header class="slds-modal__header">
                <h2>Item Details</h2>
                <button class="slds-button slds-button_icon slds-modal__close" title="Close" onclick={closeModal}>
                    <lightning-icon icon-name="utility:close" alternative-text="close"></lightning-icon>
                </button>
            </header>
            <div class="slds-modal__content slds-p-around_medium">
                <template if:true={item}>
                    <div class="slds-grid slds-wrap">
                        <div class="slds-col slds-size_1-of-2 slds-p-around_small">
                            <img src={item.Image__c} alt={item.Name} class="slds-image" 
                                 onerror={handleImageError} style="max-width:100%;" />
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-p-around_small">
                            <dl class="slds-dl_horizontal">
                                <dt class="slds-dl_horizontal__label">Name</dt>
                                <dd class="slds-dl_horizontal__detail">{item.Name}</dd>
                                
                                <dt class="slds-dl_horizontal__label">Description</dt>
                                <dd class="slds-dl_horizontal__detail">{item.Description__c}</dd>
                                
                                <dt class="slds-dl_horizontal__label">Family</dt>
                                <dd class="slds-dl_horizontal__detail">{item.Family__c}</dd>
                                
                                <dt class="slds-dl_horizontal__label">Type</dt>
                                <dd class="slds-dl_horizontal__detail">{item.Type__c}</dd>
                                
                                <dt class="slds-dl_horizontal__label">Price</dt>
                                <dd class="slds-dl_horizontal__detail">{item.Price__c}</dd>
                                
                                <dt class="slds-dl_horizontal__label">Available Quantity</dt>
                                <dd class="slds-dl_horizontal__detail">{item.AvailableQuantity__c}</dd>
                            </dl>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
