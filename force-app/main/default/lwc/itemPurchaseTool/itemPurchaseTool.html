<template>
    <lightning-card>
        <div class="slds-p-around_medium header-box">
                <lightning-layout horizontal-align="spread" vertical-align="center">
                    <lightning-layout-item padding="around-small">
                        <lightning-button label="Create Item" onclick={openCreateModal} variant="neutral" lwc:if={isManager}></lightning-button>
                    </lightning-layout-item>
                    <lightning-layout-item padding="around-small" size="auto">
                        <span class="account-info">Account Name: {accountName}</span>
                    </lightning-layout-item>
                    <lightning-layout-item padding="around-small" size="auto">
                        <span class="account-info">Account Number: {accountNumber}</span>
                    </lightning-layout-item>
                    <lightning-layout-item padding="around-small" size="auto">
                        <span class="account-info">Account Industry: {industry}</span>
                    </lightning-layout-item>

                    <lightning-layout-item padding="around-small">
                        <lightning-button label="Cart" onclick={openCartModal} variant="neutral"></lightning-button>
                    </lightning-layout-item>
                </lightning-layout>
            </div>
            <div class="slds-p-around_medium search-box-container">
                <input type="text" class="slds-input search-box" placeholder="SEARCH" onchange={handleSearch} />
            </div>
            <lightning-layout vertical-align="stretch" class="slds-p-horizontal_medium slds-p-bottom_medium">
                <lightning-layout-item size="8">
                <div class="slds-grid slds-wrap slds-gutters">
                    <template for:each={filteredItems} for:item="item">
                        <lightning-layout-item key={item.id} size="6" class="slds-p-around_small">
                            <div class="slds-box item-card slds-text-align_center">
                                <h3 class="slds-text-heading_small slds-m-bottom_small">{item.Name}</h3>
                                <div class="item-image-area">
                                    {item.Description__c}
                                    <img src={itemImage} class="tile-image" />
                                </div>
                                <div class="slds-grid slds-gutters slds-m-top_medium button-area">
                                    <lightning-layout-item size="6">
                                        <lightning-button label="Details" onclick={handleDetails} variant="neutral" class="slds-size_full"></lightning-button>
                                    </lightning-layout-item>
                                    <lightning-layout-item size="6">
                                        <lightning-button label="Add" onclick={handleAdd} variant="neutral" class="slds-size_full"></lightning-button>
                                    </lightning-layout-item>
                                </div>
                            </div>
                        </lightning-layout-item>
                    </template>
                </div>
            </lightning-layout-item>
            <lightning-layout-item size="4">
                <div class="slds-box filter-sidebar slds-p-around_medium">
    <h2 class="slds-text-heading_medium slds-m-bottom_medium">FILTERS</h2>
    <lightning-combobox name="family" label="Family" value={selectedFamily} 
                        options={familyOptions} onchange={handleFilterChange}></lightning-combobox>
    <lightning-combobox name="type" label="Type" value={selectedType} 
                        options={typeOptions} onchange={handleFilterChange}></lightning-combobox>
    <p>Items found: {filteredItems.length}</p>
</div>
            </lightning-layout-item>
        </lightning-layout>
    </lightning-card>



<template if:true={showCreateModal}>
        <c-create-item-modal
            onclose={closeCreateModal}
            onitemcreated={handleItemCreated}
        ></c-create-item-modal>
    </template>
</template>
