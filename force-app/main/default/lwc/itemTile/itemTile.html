<template>
    <div class="tile-card slds-card slds-card_boundary">
        <div class="slds-card__body tile-body">
            <h3 class="slds-text-heading_small slds-truncate" title={item.Name}>{item.Name}</h3>
            <p class="slds-text-body_small tile-description">{item.Description__c}</p>
        </div>
        <div class="tile-card__image">
            <img src={itemImage} alt={item.Name} class="tile-image" />
        </div>
        <footer class="slds-card__footer tile-footer">
            <lightning-button label="Details" onclick={showDetails}></lightning-button>
            <lightning-button label="Add to Cart" onclick={addToCart} disabled={outOfStock} variant="brand"></lightning-button>
        </footer>
    </div>
</template>
