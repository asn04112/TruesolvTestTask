<template>
    <div class="slds-col slds-size_1-of-3 slds-p-around_small">
        <div class="slds-card">
            <img src={item.Image_URL__c} alt={item.Name} class="slds-card__header-img" />
            <div class="slds-card__body">
                <h3>{item.Name}</h3>
                <p>{item.Description}</p>
            </div>
            <footer class="slds-card__footer">
                <lightning-button label="Details" onclick={showDetails}></lightning-button>
                <lightning-button label="Add to Cart" onclick={addToCart} disabled={outOfStock}></lightning-button>
            </footer>
        </div>
    </div>
</template>
